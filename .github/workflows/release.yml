name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Download Windows ADB
        run: |
          Invoke-WebRequest https://dl.google.com/android/repository/platform-tools-latest-windows.zip -OutFile platform-tools.zip
          Expand-Archive platform-tools.zip -DestinationPath platform-tools-extracted
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item platform-tools-extracted\platform-tools\adb.exe bin\adb.exe

      - name: Build exe
        run: |
          uv run pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "Android TV Desktop Toolkit" `
            --icon "assets\icon.ico" `
            --add-data "assets;assets" `
            --add-data "bin;bin" `
            --collect-all customtkinter `
            android_tv_tools.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist\Android TV Desktop Toolkit.exe
          generate_release_notes: true
